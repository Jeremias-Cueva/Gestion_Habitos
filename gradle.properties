# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX y Estilo de código
android.useAndroidX=true
kotlin.code.style=official

# Optimizaciones de compilación
android.nonTransitiveRClass=true
android.defaults.buildfeatures.resvalues=true
android.sdk.defaultTargetSdkToCompileSdkIfUnset=false
android.enableAppCompileTimeRClass=false
android.uniquePackageNames=false
android.dependency.useConstraints=true

# --- CONFIGURACIÓN PARA MONGODB Y SDK 35 (VITAL) ---
# Habilita el modo completo de R8 para procesar Java Records
android.enableR8.fullMode=true
android.defaults.buildfeatures.buildconfig=true

# Fuerza al motor D8 a realizar el desugaring de librerías modernas
android.enableD8.desugaring=true
# Optimiza el grafo de dependencias para evitar el error de Global Synthetics
android.control.desugarGraph=true

# Ajustes de R8 para evitar conflictos de empaquetado
android.r8.strictFullModeForKeepRules=false
android.r8.optimizedResourceShrinking=false